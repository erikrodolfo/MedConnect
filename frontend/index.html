<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--Ajuda o navegador a renderizar melhgor inputs, scrollbars, etc-->
    <meta name="color-schema" content="light dark"> 

    <!--Favicon Apple-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./src/assets/favicon_io/apple-touch-icon.png"
    />
    <!--Favicon 32x32-->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./src/assets/favicon_io/favicon-32x32.png"
    />
    <!--Favicon 16x16-->
    <link rel="icon" type="image/png" sizes="16x16" href="./src/assets/favicon_io/favicon-16x16.png" />

    <link rel="manifest" href="./src/assets/favicon_io/site.webmanifest" />
    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <!--fonts -->

     <!--Função auto-executável para não dar flash na trtoca de temas-->
    <script>
  (function () {
    const saved = localStorage.getItem('theme');

    let theme;

    if (saved === 'light' || saved === 'dark') {
      theme = saved;
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      theme = prefersDark ? 'dark' : 'light';
    }

    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>

    <title>MedConnect</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
